# Local dev stack. Prod reuses this shape with env overrides + the app services
# (collector/processor/api/web/caddy) layered on. See DESIGN.md §8.
name: reqradar

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: reqradar
      POSTGRES_PASSWORD: reqradar
      POSTGRES_DB: reqradar
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reqradar"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    # -js enables JetStream (persistence/replay); -m 8222 exposes monitoring.
    command: ["-js", "-m", "8222"]
    ports: ["4222:4222", "8222:8222"]

# NOTE: a Prometheus + Grafana pair lived here, but no service exposes a /metrics
# endpoint yet, so they scraped nothing. Removed to keep the stack honest and the
# deploy small. detect_to_alert_ms already lives in the `alerts` table; wiring a
# real promhttp endpoint + one histogram is a post-deploy enhancement (DESIGN §7).

volumes:
  pgdata:
