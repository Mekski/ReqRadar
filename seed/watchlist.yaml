# ReqRadar watchlist + source config. Hand-edit to add/remove companies, then
# re-run `make seed` (idempotent upsert). Source of truth for the entity
# registry, the watchlist, and collector source config. Slugs verified live
# 2026-06-13 — see WATCHLIST.md.

user:
  name: Mark Mairs
  # telegram_chat_id comes from the TELEGRAM_CHAT_ID env var at seed time
  # (reuse the bot/chat from job-watch). Re-run seed after setting it.

companies:
  # `expected_estimate` is a CURATED summer-SWE open-month estimate, shown on the
  # dashboard ONLY when a company lacks ≥5 backfilled summer-SWE postings (the
  # data-derived month wins when present — see attachExpected, minSamples=5). It
  # is static reference data, deliberately NOT a runtime LLM call (DESIGN §10 / the
  # 2026-06-16 decision). Use "rolling" for companies that hire continuously with
  # no documented season (mostly the AI labs). Sources noted per company; the 9
  # data-derived companies (Amazon/Apple/EA/Epic/Meta/Microsoft/NVIDIA/Tesla/TikTok)
  # carry no estimate because their real timing already qualifies.
  #
  # Tiers below mirror the live watchlist as of 2026-06-15 (reconciled with the
  # dashboard edits) so `make seed` is reproducible and non-destructive.

  # --- Directly pollable via Greenhouse/Ashby ---
  - canonical_name: Roblox
    domain: roblox.com
    priority: S
    ats: { platform: greenhouse, slug: roblox }
    aliases: [roblox]
    expected_estimate: Jul # first SWE-intern round historically opens Jul–Aug (a later round + the March Lua apprenticeship are separate)

  - canonical_name: Anthropic
    domain: anthropic.com
    priority: S
    ats: { platform: greenhouse, slug: anthropic }
    aliases: [anthropic]
    expected_estimate: rolling # Greenhouse, reviewed on a rolling basis; no fixed season (alignment.anthropic.com)

  - canonical_name: OpenAI
    domain: openai.com
    priority: A
    ats: { platform: ashby, slug: openai }
    aliases: [openai, open ai]
    expected_estimate: rolling # "adaptive to business needs," hires on a rolling basis (openai.com/residency)

  - canonical_name: xAI
    domain: x.ai
    priority: A
    ats: { platform: greenhouse, slug: xai }
    aliases: [xai, x.ai, x ai]
    expected_estimate: rolling # ad-hoc/rolling postings, no documented intern season

  - canonical_name: Riot Games
    domain: riotgames.com
    priority: S
    ats: { platform: greenhouse, slug: riotgames }
    aliases: [riot games, riotgames, riot]
    expected_estimate: Sep # SWE roles live late Sept, deadline ~Oct 31 (Riot LinkedIn)

  - canonical_name: Epic Games
    domain: epicgames.com
    priority: B
    ats: { platform: greenhouse, slug: epicgames }
    aliases: [epic games, epicgames]

  - canonical_name: Notion
    domain: notion.so
    priority: A
    ats: { platform: ashby, slug: notion }
    aliases: [notion, notion labs, notion.com]
    expected_estimate: rolling # Ashby, "apply as soon as possible," fills on a rolling basis

  # Added 2026-06-15 (Mark's ranking). ATS boards verified live, so these get the
  # rich pipeline + extracted pay; expected-open left to backfill (data-derived) /
  # a later curated pass.
  - canonical_name: Discord
    domain: discord.com
    priority: A
    ats: { platform: greenhouse, slug: discord }
    aliases: [discord]
    expected_estimate: Sep # big-tech fall wave; open month not documented (low confidence)

  - canonical_name: Stripe
    domain: stripe.com
    priority: A
