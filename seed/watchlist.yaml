  - canonical_name: Coinbase
    domain: coinbase.com
    priority: B
    ats: { platform: greenhouse, slug: coinbase }
    aliases: [coinbase]
    expected_estimate: Sep # big-tech fall wave; rolling, open month not documented (low confidence)

  - canonical_name: Airbnb
    domain: airbnb.com
    priority: B
