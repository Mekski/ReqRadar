name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  integration:
    runs-on: ubuntu-latest
    # Real Postgres + NATS so the processor's dedupe/diff state machine is tested
    # against the actual SQL/schema (build tag `integration`; see internal/processor).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: reqradar
          POSTGRES_PASSWORD: reqradar
          POSTGRES_DB: reqradar_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U reqradar"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REQRADAR_TEST_DSN: postgres://reqradar:reqradar@localhost:5432/reqradar_test?sslmode=disable
      REQRADAR_TEST_NATS_URL: nats://localhost:4222
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      # NATS runs as a step, not a service container, because JetStream needs the
      # `-js` flag and service containers can't override the image command.
      - name: Start NATS (JetStream)
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:2-alpine -js -m 8222
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8222/healthz >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8222/healthz
      - run: go test -tags=integration ./internal/processor/...
